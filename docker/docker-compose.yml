version: "3.8"

services:
  # ==================== MAIN APP ====================
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://printflow:printflow@postgres:5432/printflow
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # ==================== SLICING WORKER ====================
  slicer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.slicer
    environment:
      - REDIS_URL=redis://redis:6379
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    volumes:
      - slicer-tmp:/tmp/slicer
    depends_on:
      - redis
    restart: unless-stopped

  # ==================== AI MONITOR WORKER ====================
  ai-monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://printflow:printflow@postgres:5432/printflow
      - AI_MODEL_PATH=/models/spaghetti-detector.pt
    volumes:
      - ai-models:/models
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ==================== PRINTER BRIDGE ====================
  printer-bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bridge
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://printflow:printflow@postgres:5432/printflow
    network_mode: host  # potrzebne do łączności z drukarkami w sieci LAN
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ==================== INFRA ====================
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=printflow
      - POSTGRES_PASSWORD=printflow
      - POSTGRES_DB=printflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  slicer-tmp:
  ai-models:
